// build.gradle

plugins {
    id 'java'
}

group = 'com.eventstream'

version = '1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        java {
            srcDir '.'
            include 'broker/**/*.java', 'consumer/**/*.java', 'producer/**/*.java', 'shared/**/*.java'
        }
    }
}